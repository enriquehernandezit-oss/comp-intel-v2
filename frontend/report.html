<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CompIntel · Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root { --accent: #e7ff52; --accent-ink: #0a0a0b; }
    .nav-search-wrap { display:flex; align-items:center; gap:0.5rem; }
    .nav-search-box { display:flex; background:#0C1018; border:1px solid #1A2233; border-radius:6px; overflow:hidden; transition:border-color 0.15s; }
    .nav-search-box:focus-within { border-color:var(--accent); }
    .nav-search-input { background:transparent; border:none; outline:none; padding:6px 10px; font-family:'DM Sans',sans-serif; font-size:0.82rem; color:#E8EDF5; width:220px; }
    .nav-search-input::placeholder { color:#3A4A60; }
    .nav-search-btn { background:var(--accent); border:none; padding:0 10px; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.65rem; font-weight:600; color:#0a0a0b; letter-spacing:0.06em; text-transform:uppercase; transition:opacity 0.15s; }
    .nav-search-btn:hover { opacity:0.85; }
    .nav-search-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .nav-back-btn { background:none; border:1px solid #1A2233; border-radius:5px; padding:5px 10px; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.65rem; color:#6A7A90; letter-spacing:0.06em; transition:all 0.15s; text-decoration:none; display:flex; align-items:center; gap:0.4rem; }
    .nav-back-btn:hover { border-color:var(--accent); color:var(--accent); }
    #loading-screen { position:fixed; inset:0; background:#080B0F; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem; }
    #loading-screen.hidden { display:none; }
    .ls-logo { font-family:'DM Mono',monospace; font-size:0.9rem; font-weight:600; color:#fff; letter-spacing:0.14em; text-transform:uppercase; }
    .ls-logo span { color:var(--accent,#e7ff52); }
    .ls-msg { font-family:'DM Mono',monospace; font-size:0.72rem; color:#3A4A60; }
    #rerun-overlay { display:none; position:fixed; inset:0; background:rgba(8,11,15,0.92); backdrop-filter:blur(6px); z-index:400; flex-direction:column; align-items:center; justify-content:center; gap:1.2rem; }
    #rerun-overlay.visible { display:flex; }
    .rerun-logo { font-family:'DM Mono',monospace; font-size:0.88rem; font-weight:600; color:#fff; letter-spacing:0.14em; text-transform:uppercase; }
    .rerun-logo span { color:var(--accent,#e7ff52); }
    .rerun-company { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--accent,#e7ff52); letter-spacing:0.1em; text-transform:uppercase; }
    .rerun-steps { display:flex; flex-direction:column; gap:0.55rem; width:300px; }
    .rerun-step { display:flex; align-items:center; gap:0.7rem; font-family:'DM Mono',monospace; font-size:0.72rem; color:#3A4A60; transition:color 0.3s; }
    .rerun-step.active { color:#C8D0DC; }
    .rerun-step.done { color:#3A4A60; }
    .rerun-dot { width:7px; height:7px; border-radius:50%; background:#1A2233; flex-shrink:0; transition:background 0.3s; }
    .rerun-step.active .rerun-dot { background:#2D7DFF; animation:pulse-dot 1s ease infinite; }
    .rerun-step.done .rerun-dot { background:#2ED573; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)} }
    .rerun-bar-wrap { width:300px; height:2px; background:#1A2233; border-radius:1px; overflow:hidden; }
    .rerun-bar { height:100%; background:var(--accent,#e7ff52); border-radius:1px; width:0%; transition:width 0.4s ease; }
    .toast { display:none; position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:#1f0a0a; border:1px solid #3a1414; border-radius:6px; padding:0.75rem 1.2rem; font-size:0.84rem; color:#FF4757; z-index:600; white-space:nowrap; }
    .toast.visible { display:block; }
    .bottom-search-wrap { text-align:center; padding:2rem 0 4rem 0; }
    .bottom-search-label { font-family:'DM Mono',monospace; font-size:0.72rem; color:#3A4A60; margin-bottom:1rem; letter-spacing:0.08em; text-transform:uppercase; }
    .bottom-search-box { display:inline-flex; background:#0C1018; border:1px solid #1A2233; border-radius:8px; overflow:hidden; transition:border-color 0.2s; }
    .bottom-search-box:focus-within { border-color:var(--accent); }
    .bottom-search-input { background:transparent; border:none; outline:none; padding:0.75rem 1rem; font-family:'DM Sans',sans-serif; font-size:0.9rem; color:#E8EDF5; width:320px; }
    .bottom-search-input::placeholder { color:#3A4A60; }
    .bottom-search-btn { background:var(--accent); border:none; padding:0 1.2rem; cursor:pointer; font-family:'DM Mono',monospace; font-size:0.75rem; font-weight:600; color:#0a0a0b; letter-spacing:0.08em; text-transform:uppercase; transition:opacity 0.15s; }
    .bottom-search-btn:hover { opacity:0.85; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="ls-logo">&#9672; COMP<span>INTEL</span></div>
    <div class="ls-msg">Loading report...</div>
  </div>
  <div id="rerun-overlay">
    <div class="rerun-logo">&#9672; COMP<span>INTEL</span></div>
    <div class="rerun-company" id="rerun-company">ANALYZING</div>
    <div class="rerun-steps">
      <div class="rerun-step" id="rs-news"><div class="rerun-dot"></div>Scanning news and events</div>
      <div class="rerun-step" id="rs-competitors"><div class="rerun-dot"></div>Identifying competitors</div>
      <div class="rerun-step" id="rs-sentiment"><div class="rerun-dot"></div>Measuring public perception</div>
      <div class="rerun-step" id="rs-swot"><div class="rerun-dot"></div>Building strategic analysis</div>
      <div class="rerun-step" id="rs-investment"><div class="rerun-dot"></div>Running investment signals</div>
    </div>
    <div class="rerun-bar-wrap"><div class="rerun-bar" id="rerun-bar"></div></div>
  </div>
  <div class="toast" id="toast"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;
    const { useState: useS, useEffect: useE, useRef: useR } = React;

    const Chip = ({ children, tone, className }) => {
      tone = tone || "neutral"; className = className || "";
      const tones = { neutral:"ci-chip-neutral", bull:"ci-chip-bull", bear:"ci-chip-bear", warn:"ci-chip-warn", accent:"ci-chip-accent", ghost:"ci-chip-ghost" };
      return <span className={"ci-chip " + (tones[tone] || "") + " " + className}>{children}</span>;
    };

    const SectionHeader = ({ num, title, kicker, right }) => (
      <header className="ci-sec-head">
        <div className="ci-sec-head-l">
          <span className="ci-sec-num">{num}</span>
          <div>
            <h2 className="ci-sec-title">{title}</h2>
            {kicker && <p className="ci-sec-kicker">{kicker}</p>}
          </div>
        </div>
        {right && <div className="ci-sec-head-r">{right}</div>}
      </header>
    );

    const Stat = ({ label, value, sub, tone }) => (
      <div className="ci-stat">
        <div className="ci-stat-label">{label}</div>
        <div className={"ci-stat-value " + (tone ? "tone-" + tone : "")}>{value}</div>
        {sub && <div className="ci-stat-sub">{sub}</div>}
      </div>
    );

    const Source = ({ n, host }) => (
      <a className="ci-src" href="#" onClick={(e) => e.preventDefault()}>
        <span className="ci-src-n">{n}</span>
        <span className="ci-src-host">{host}</span>
      </a>
    );

    const Bar = ({ value, max, tone }) => {
      max = max || 100; tone = tone || "accent";
      const pct = Math.max(0, Math.min(100, (value / max) * 100));
      return (
        <div className={"ci-bar ci-bar-" + tone}>
          <div className="ci-bar-fill" style={{ width: pct + "%" }} />
        </div>
      );
    };

    const Hero = ({ data }) => {
      const price      = typeof data.price === "number" ? "$" + data.price.toFixed(2) : (data.price || "N/A");
      const change     = typeof data.change === "number" ? (data.change > 0 ? "+" : "") + "$" + data.change.toFixed(2) + " today" : (data.change || "");
      const deltaPct   = typeof data.deltaPct === "number" ? Math.abs(data.deltaPct).toFixed(2) + "%" : String(data.deltaPct || "");
      const deltaNum   = typeof data.deltaPct === "number" ? data.deltaPct : parseFloat(data.deltaPct);
      const deltaArrow = deltaNum > 0 ? "▲" : "▼";
      return (
        <section className="ci-hero" data-screen-label="Hero">
          <div className="ci-hero-meta">
            <Chip tone="accent">FULL BRIEFING</Chip>
            <span className="ci-hero-time">Generated {data.generated} · 5 agents</span>
          </div>
          <div className="ci-hero-grid">
            <div className="ci-hero-l">
              <div className="ci-hero-tag">{data.sector} · {data.industry}</div>
              <h1 className="ci-hero-title">{data.name}</h1>
              <div className="ci-hero-ticker-row">
                <span className="ci-hero-symbol">{data.symbol}</span>
                <span className={"ci-hero-price-delta tone-" + (data.deltaTone || "neutral")}>
                  {deltaArrow} {deltaPct}
                </span>
              </div>
              <p className="ci-hero-summary">{data.summary}</p>
            </div>
            <div className="ci-hero-r">
              <div className="ci-hero-price">
                <div className="ci-hero-price-label">LAST</div>
                <div className="ci-hero-price-value">{price}</div>
                <div className="ci-hero-price-sub">{change}</div>
              </div>
              <div className="ci-hero-stats">
                <Stat label="MARKET CAP" value={data.marketCap || "N/A"} />
                <Stat label="P/E (TTM)"  value={data.pe || "N/A"} />
                <Stat label="52W RANGE"  value={data.range || "N/A"} />
                <Stat label="ANALYST"    value={data.analyst || "N/A"} tone="bull" />
              </div>
            </div>
          </div>
        </section>
      );
    };

    const NewsSection = ({ items }) => (
      <section className="ci-sec" id="news" data-screen-label="01 News">
        <SectionHeader num="01" title="Recent Intelligence" kicker="Web scan via Tavily · last 30 days"
          right={<Chip tone="ghost">{items.length} signals</Chip>} />
        <ol className="ci-news">
          {items.map((it, i) => (
            <li key={i} className="ci-news-item">
              <div className="ci-news-meta">
                <span className="ci-news-date">{it.date}</span>
                <Chip tone={it.tone}>{it.tag}</Chip>
              </div>
              <h3 className="ci-news-title">{it.title}</h3>
              <p className="ci-news-summary">{it.summary}</p>
              <div className="ci-news-srcs">
                {it.sources.map((s, j) => <Source key={j} n={(i+1) + "." + (j+1)} host={s} />)}
              </div>
            </li>
          ))}
        </ol>
      </section>
    );

    const CompetitorsSection = ({ items }) => (
      <section className="ci-sec" id="competitors" data-screen-label="02 Competitors">
        <SectionHeader num="02" title="Competitive Landscape" kicker="Positioning, pricing signals, recent moves"
          right={<Chip tone="ghost">{items.length} mapped</Chip>} />
        <div className="ci-comps">
          {items.map((c, i) => (
            <article key={i} className="ci-comp">
              <div className="ci-comp-head">
                <div className="ci-comp-mark" style={{ background: c.color }}>{(c.name || "?")[0]}</div>
                <div className="ci-comp-id">
                  <div className="ci-comp-name">{c.name}</div>
                  <div className="ci-comp-sym">{c.symbol} · {c.region}</div>
                </div>
                <div className={"ci-comp-threat tone-" + c.threatTone}>
                  <div className="ci-comp-threat-label">THREAT</div>
                  <div className="ci-comp-threat-value">{c.threat}</div>
                </div>
              </div>
              <p className="ci-comp-pos">{c.positioning}</p>
              <dl className="ci-comp-stats">
                <div><dt>SHARE</dt><dd>{c.share}</dd></div>
                <div><dt>PRICING</dt><dd>{c.pricing}</dd></div>
                <div><dt>GROWTH</dt><dd className={"tone-" + c.growthTone}>{c.growth}</dd></div>
              </dl>
              <div className="ci-comp-move">
                <span className="ci-comp-move-label">LATEST</span>
                <span className="ci-comp-move-text">{c.move}</span>
              </div>
            </article>
          ))}
        </div>
      </section>
    );

    const SentimentSection = ({ data }) => {
      const score      = data.score;
      const pointerPct = ((score + 100) / 200) * 100;
      return (
        <section className="ci-sec" id="sentiment" data-screen-label="03 Sentiment">
          <SectionHeader num="03" title="Public Sentiment" kicker="Reviews, social, press · weighted by recency"
            right={<Chip tone={data.trend === "Improving" ? "bull" : data.trend === "Declining" ? "bear" : "neutral"}>{data.trend}</Chip>} />
          <div className="ci-sent">
            <div className="ci-sent-gauge">
              <div className="ci-sent-score-row">
                <div>
                  <div className="ci-sent-score-label">SENTIMENT SCORE</div>
                  <div className={"ci-sent-score tone-" + (score > 20 ? "bull" : score < -20 ? "bear" : "neutral")}>
                    {score > 0 ? "+" : ""}{score}
                  </div>
                  <div className="ci-sent-score-sub">on a -100 to +100 scale</div>
                </div>
                <div className="ci-sent-legend">
                  <span><i className="ci-dot ci-dot-bear" /> Bearish</span>
                  <span><i className="ci-dot ci-dot-neutral" /> Neutral</span>
                  <span><i className="ci-dot ci-dot-bull" /> Bullish</span>
                </div>
              </div>
              <div className="ci-sent-axis">
                <div className="ci-sent-track" />
                <div className="ci-sent-pointer" style={{ left: pointerPct + "%" }}>
                  <div className="ci-sent-pointer-line" />
                  <div className="ci-sent-pointer-bub">{score > 0 ? "+" : ""}{score}</div>
                </div>
                <div className="ci-sent-marks">
                  <span>-100</span><span>-50</span><span>0</span><span>+50</span><span>+100</span>
                </div>
              </div>
            </div>
            <ul className="ci-sent-drivers">
              {data.drivers.map((d, i) => (
                <li key={i} className="ci-driver">
                  <div className="ci-driver-head">
                    <span className={"ci-driver-arrow tone-" + (d.dir > 0 ? "bull" : "bear")}>{d.dir > 0 ? "▲" : "▼"}</span>
                    <span className="ci-driver-name">{d.name}</span>
                    <span className="ci-driver-strength">{Math.abs(d.dir)}/10</span>
                  </div>
                  <Bar value={Math.abs(d.dir) * 10} tone={d.dir > 0 ? "bull" : "bear"} />
                  <p className="ci-driver-note">{d.note}</p>
                </li>
              ))}
            </ul>
          </div>
        </section>
      );
    };

    const SWOT_META = {
      S: { tone: "bull",   title: "Strengths" },
      W: { tone: "bear",   title: "Weaknesses" },
      O: { tone: "accent", title: "Opportunities" },
      T: { tone: "warn",   title: "Threats" },
    };

    const SwotSection = ({ data }) => (
      <section className="ci-sec" id="swot" data-screen-label="04 SWOT">
        <SectionHeader num="04" title="SWOT Synthesis" kicker="Each finding cites its source" />
        <div className="ci-swot">
          {["S","W","O","T"].map((k) => {
            const meta = SWOT_META[k];
            return (
              <div key={k} className={"ci-swot-q ci-swot-" + k}>
                <header className="ci-swot-head">
                  <span className={"ci-swot-letter tone-" + meta.tone}>{k}</span>
                  <span className="ci-swot-title">{meta.title}</span>
                  <span className="ci-swot-count">{data[k].length}</span>
                </header>
                <ul className="ci-swot-list">
                  {data[k].map((it, i) => (
                    <li key={i}>
                      <p>{it.text}</p>
                      <Source n={k + "." + (i+1)} host={it.src} />
                    </li>
                  ))}
                </ul>
              </div>
            );
          })}
        </div>
      </section>
    );

    const InvestmentSection = ({ data }) => (
      <section className="ci-sec" id="investment" data-screen-label="05 Investment">
        <SectionHeader num="05" title="Investment Outlook" kicker="Bull vs bear · catalysts · three strategies"
          right={<Chip tone={data.signal === "Bullish" ? "bull" : data.signal === "Bearish" ? "bear" : "neutral"}>{"SIGNAL · " + data.signal.toUpperCase()}</Chip>} />
        <div className="ci-inv-thesis">
          <div className="ci-thesis ci-thesis-bull">
            <div className="ci-thesis-head"><span className="ci-thesis-tag tone-bull">BULL CASE</span></div>
            <p>{data.bull}</p>
          </div>
          <div className="ci-thesis ci-thesis-bear">
            <div className="ci-thesis-head"><span className="ci-thesis-tag tone-bear">BEAR CASE</span></div>
            <p>{data.bear}</p>
          </div>
        </div>
        <div className="ci-inv-cats">
          <div className="ci-catbox">
            <h4>Key Catalysts</h4>
            <ul>{(data.catalysts || []).map((c, i) => <li key={i}><span className="ci-catbox-arrow">↗</span>{c}</li>)}</ul>
          </div>
          <div className="ci-catbox ci-catbox-risk">
            <h4>Key Risks</h4>
            <ul>{(data.risks || []).map((c, i) => <li key={i}><span className="ci-catbox-arrow">↘</span>{c}</li>)}</ul>
          </div>
        </div>
        <h3 className="ci-strats-title">Three Strategies</h3>
        <div className="ci-strats">
          {(data.strategies || []).map((s, i) => (
            <article key={i} className={"ci-strat ci-strat-" + s.style}>
              <header className="ci-strat-head">
                <div>
                  <div className="ci-strat-num">{"STRATEGY " + String(i+1).padStart(2,"0")}</div>
                  <h4 className="ci-strat-name">{s.name}</h4>
                </div>
                <Chip tone={s.style === "agg" ? "bear" : s.style === "mod" ? "warn" : "bull"}>
                  {s.style === "agg" ? "AGGRESSIVE" : s.style === "mod" ? "MODERATE" : "CONSERVATIVE"}
                </Chip>
              </header>
              <p className="ci-strat-signal"><span>ENTRY SIGNAL · </span>{s.signal}</p>
              <dl className="ci-strat-grid">
                <div><dt>ENTRY ZONE</dt><dd>{s.entry}</dd></div>
                <div><dt>TARGET</dt><dd className="tone-bull">{s.target}</dd></div>
                <div><dt>STOP LOSS</dt><dd className="tone-bear">{s.stop}</dd></div>
                <div><dt>POSITION</dt><dd>{s.position}</dd></div>
              </dl>
              <div className="ci-strat-needs">
                <div>
                  <div className="ci-strat-needs-h">CATALYSTS NEEDED</div>
                  <ul>{(s.needs || []).map((n, j) => <li key={j}>{n}</li>)}</ul>
                </div>
                <div>
                  <div className="ci-strat-needs-h">EXIT CONDITIONS</div>
                  <ul>{(s.exits || []).map((n, j) => <li key={j}>{n}</li>)}</ul>
                </div>
              </div>
            </article>
          ))}
        </div>
      </section>
    );

    const Foot = () => (
      <footer className="ci-foot">
        <div className="ci-foot-l">
          <span className="ci-foot-mark" />
          <span>COMPINTEL</span>
          <span className="ci-foot-sep">·</span>
          <span>Briefing generated by sequential 5-agent pipeline</span>
        </div>
        <div className="ci-foot-r">Not investment advice. Verify all data before trading. Sources cited inline.</div>
      </footer>
    );

    const SUGGESTIONS = [
      "Which strategy is best for a beginner?",
      "Search for the latest news on this company",
      "What is the P/E ratio and is this one good?",
      "What's the biggest risk right now?",
    ];

    const TOOL_STEPS = [
      { label: "Reading executive summary" },
      { label: "Scanning section 03 — Sentiment" },
      { label: "Cross-referencing news + SWOT" },
    ];

    const ChatFab = ({ open, onToggle, unread }) => (
      <button className={open ? "ci-fab ci-fab-open" : "ci-fab"} onClick={onToggle} aria-label="Open assistant">
        <span className="ci-fab-pulse" />
        <span className="ci-fab-pulse ci-fab-pulse-2" />
        {open ? (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
            <line x1="6" y1="6" x2="18" y2="18" /><line x1="6" y1="18" x2="18" y2="6" />
          </svg>
        ) : (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        )}
        {unread > 0 && !open && <span className="ci-fab-badge">{unread}</span>}
      </button>
    );

    const Citation = ({ section }) => {
      const map = {
        "01": { id: "news",        label: "01 News" },
        "02": { id: "competitors", label: "02 Competitors" },
        "03": { id: "sentiment",   label: "03 Sentiment" },
        "04": { id: "swot",        label: "04 SWOT" },
        "05": { id: "investment",  label: "05 Investment" },
      };
      const m = map[section] || { id: "news", label: section };
      return (
        <a className="ci-cite" href={"#" + m.id} onClick={(e) => {
          e.preventDefault();
          const el = document.getElementById(m.id);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        }}>
          <span className="ci-cite-bracket">[</span>{m.label}<span className="ci-cite-bracket">]</span>
        </a>
      );
    };

    function renderAssistant(text) {
      const parts = [];
      const re    = /\[(0[1-5])\]/g;
      let last = 0, match, key = 0;
      while ((match = re.exec(text)) !== null) {
        if (match.index > last) parts.push(<span key={key++}>{text.slice(last, match.index)}</span>);
        parts.push(<Citation key={key++} section={match[1]} />);
        last = match.index + match[0].length;
      }
      if (last < text.length) parts.push(<span key={key++}>{text.slice(last)}</span>);
      return parts;
    }

    const Bubble = ({ msg }) => {
      if (msg.role === "user") return (
        <div className="ci-msg ci-msg-user"><div className="ci-msg-body">{msg.text}</div></div>
      );
      if (msg.role === "tool") return (
        <div className="ci-msg ci-msg-tool"><span className="ci-tool-spin" /><span className="ci-tool-text">{msg.text}</span></div>
      );
      return (
        <div className="ci-msg ci-msg-bot">
          <div className="ci-msg-avatar"><span className="ci-msg-avatar-mark" /></div>
          <div className="ci-msg-body">{renderAssistant(msg.text)}</div>
        </div>
      );
    };

    const TypingDots = () => (
      <div className="ci-msg ci-msg-bot">
        <div className="ci-msg-avatar"><span className="ci-msg-avatar-mark" /></div>
        <div className="ci-typing"><span /><span /><span /></div>
      </div>
    );

    const ChatWindow = ({ open, briefing, onClose, apiBase }) => {
      const [messages, setMessages] = useS([{
        role: "assistant",
        text: "Hi — I have loaded your briefing on " + briefing.hero.name + ". Ask me anything about this report, or I can search the web for anything beyond it — recent news, live prices, general finance questions.",
      }]);
      const [draft, setDraft] = useS("");
      const [busy,  setBusy]  = useS(false);
      const [tool,  setTool]  = useS(null);
      const scrollRef = useR(null);
      const inputRef  = useR(null);

      useE(() => {
        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
      }, [messages, busy, tool]);

      useE(() => {
        if (open) setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 250);
      }, [open]);

      const send = async (text) => {
        const q = (text !== undefined ? text : draft).trim();
        if (!q || busy) return;
        setDraft("");
        setBusy(true);
        setMessages((m) => [...m, { role: "user", text: q }]);
        let stepIdx = 0;
        const stepTimer = setInterval(() => {
          setTool(TOOL_STEPS[stepIdx % TOOL_STEPS.length].label);
          stepIdx++;
        }, 700);
        setTool(TOOL_STEPS[0].label);

        try {
          const history = messages
            .filter((m) => m.role === "user" || m.role === "assistant")
            .map((m) => ({ role: m.role, content: m.text }));
          history.push({
            role: "user",
            content: q + "\n\nWhen citing report sections use: [01] News, [02] Competitors, [03] Sentiment, [04] SWOT, [05] Investment.",
          });

          const base = apiBase || "http://127.0.0.1:8001";
          const res = await fetch(base + "/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              company:  briefing.hero.symbol || briefing.hero.name,
              briefing: briefing,
              messages: history,
            }),
          });

          clearInterval(stepTimer);
          setTool(null);

          if (!res.ok) throw new Error("Server error " + res.status);

          let fullText = "";
          setMessages((m) => [...m, { role: "assistant", text: "" }]);

          const reader  = res.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const result = await reader.read();
            if (result.done) break;
            const chunk = decoder.decode(result.value, { stream: true });
            const lines = chunk.split("\n");
            for (let i = 0; i < lines.length; i++) {
              const line = lines[i];
              if (line.indexOf("data: ") === 0) {
                const data = line.slice(6).trim();
                if (data === "[DONE]") break;
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.tool) {
                    setTool(parsed.tool);
                  } else if (parsed.text) {
                    setTool(null);
                    fullText += parsed.text;
                    const snap = fullText;
                    setMessages((m) => {
                      const u = [...m];
                      u[u.length - 1] = { role: "assistant", text: snap };
                      return u;
                    });
                  }
                } catch(e) {}
              }
            }
          }
        } catch(e) {
          clearInterval(stepTimer);
          setTool(null);
          setMessages((m) => [...m, { role: "assistant", text: "Could not reach the backend. Make sure it is running on port 8001 and try again." }]);
        }
        setBusy(false);
      };

      return (
        <div className={open ? "ci-chat ci-chat-open" : "ci-chat"} role="dialog">
          <header className="ci-chat-head">
            <div className="ci-chat-id">
              <div className="ci-chat-avatar"><span /></div>
              <div>
                <div className="ci-chat-name">CompIntel Assistant</div>
                <div className="ci-chat-status">
                  <span className="ci-chat-statdot" />
                  {"Context · " + (briefing.hero.symbol || briefing.hero.name) + " · Web search enabled"}
                </div>
              </div>
            </div>
            <div className="ci-chat-acts">
              <button className="ci-chat-iconbtn" title="New conversation" onClick={() => setMessages(messages.slice(0,1))}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M3 12a9 9 0 1 0 3-6.7" /><polyline points="3 4 3 10 9 10" />
                </svg>
              </button>
              <button className="ci-chat-iconbtn" title="Close" onClick={onClose}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <line x1="6" y1="6" x2="18" y2="18" /><line x1="6" y1="18" x2="18" y2="6" />
                </svg>
              </button>
            </div>
          </header>

          <div className="ci-chat-scroll" ref={scrollRef}>
            {messages.map((msg, i) => <Bubble key={i} msg={msg} />)}
            {tool && <Bubble msg={{ role: "tool", text: tool }} />}
            {busy && !tool && <TypingDots />}
          </div>

          {messages.length <= 1 && !busy && (
            <div className="ci-chat-suggest">
              {SUGGESTIONS.map((s) => (
                <button key={s} className="ci-suggest" onClick={() => send(s)}>{s}</button>
              ))}
            </div>
          )}

          <form className="ci-chat-input" onSubmit={(e) => { e.preventDefault(); send(); }}>
            <input
              ref={inputRef}
              value={draft}
              onChange={(e) => setDraft(e.target.value)}
              placeholder={"Ask about " + (briefing.hero.symbol || briefing.hero.name) + " or search the web..."}
              disabled={busy}
            />
            <button type="submit" disabled={busy || !draft.trim()} className="ci-chat-send" aria-label="Send">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" />
              </svg>
            </button>
          </form>
          <div className="ci-chat-foot"><span>Powered by Claude · Report + live web search</span></div>
        </div>
      );
    };

    const Chatbot = ({ briefing, apiBase }) => {
      const [open, setOpen] = useS(false);
      return (
        <div>
          <ChatWindow open={open} briefing={briefing} onClose={() => setOpen(false)} apiBase={apiBase} />
          <ChatFab open={open} onToggle={() => setOpen((o) => !o)} unread={0} />
        </div>
      );
    };

    const API_BASE    = "http://127.0.0.1:8001";
    const RERUN_STEPS = ["rs-news","rs-competitors","rs-sentiment","rs-swot","rs-investment"];
    let rrStepIdx = 0, rrStepTimer = null, rrBarPct = 0, rrBarTimer = null;

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("visible");
      setTimeout(() => t.classList.remove("visible"), 4000);
    }

    function startRerun(company) {
      document.getElementById("rerun-company").textContent = "ANALYZING — " + company.toUpperCase();
      document.getElementById("rerun-overlay").classList.add("visible");
      rrStepIdx = 0; rrBarPct = 0;
      RERUN_STEPS.forEach((id) => document.getElementById(id).classList.remove("active","done"));
      rrStepTimer = setInterval(() => {
        if (rrStepIdx < RERUN_STEPS.length) {
          if (rrStepIdx > 0) {
            document.getElementById(RERUN_STEPS[rrStepIdx-1]).classList.remove("active");
            document.getElementById(RERUN_STEPS[rrStepIdx-1]).classList.add("done");
          }
          document.getElementById(RERUN_STEPS[rrStepIdx]).classList.add("active");
          rrStepIdx++;
        }
      }, 5000);
      rrBarTimer = setInterval(() => {
        if (rrBarPct < 88) {
          rrBarPct += (88 - rrBarPct) * 0.035;
          document.getElementById("rerun-bar").style.width = rrBarPct + "%";
        }
      }, 300);
    }

    function finishRerun() {
      clearInterval(rrStepTimer); clearInterval(rrBarTimer);
      RERUN_STEPS.forEach((id) => {
        document.getElementById(id).classList.remove("active");
        document.getElementById(id).classList.add("done");
      });
      document.getElementById("rerun-bar").style.width = "100%";
    }

    function stopRerun() {
      clearInterval(rrStepTimer); clearInterval(rrBarTimer);
      document.getElementById("rerun-overlay").classList.remove("visible");
    }

    async function runNewReport(company, setBriefing) {
      if (!company.trim()) { showToast("Enter a company name."); return; }
      startRerun(company);
      try {
        const res = await fetch(API_BASE + "/briefing", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ company: company.trim() }),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || "Pipeline failed."); }
        const briefing = await res.json();
        finishRerun();
        sessionStorage.setItem("briefing", JSON.stringify(briefing));
        sessionStorage.setItem("briefing_company", company.trim());
        setTimeout(() => {
          document.getElementById("rerun-overlay").classList.remove("visible");
          setBriefing(briefing);
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, 500);
      } catch(err) {
        stopRerun();
        showToast("Error: " + err.message);
      }
    }

    function TopNavWithSearch({ briefing, onNewReport }) {
      const [draft, setDraft] = useState("");
      const [busy,  setBusy]  = useState(false);

      const submit = async () => {
        if (!draft.trim() || busy) return;
        setBusy(true);
        await onNewReport(draft.trim());
        setDraft(""); setBusy(false);
      };

      const ticker  = briefing && briefing.ticker ? briefing.ticker.symbol : "";
      const ms      = briefing && briefing.marketStatus ? briefing.marketStatus : {};
      const msColor = ms.kind === "open" ? "#2ED573" : (ms.kind === "pre" || ms.kind === "after") ? "#FFA502" : "#FF4757";

      return (
        <nav className="ci-nav" id="ci-nav">
          <div className="ci-nav-left">
            <a href="index.html" className="ci-nav-logo">{"◈ COMP"}<span>{"INTEL"}</span></a>
            {ticker && (
              <div className="ci-nav-ticker">
                <span className="ci-nav-ticker-sym">{ticker}</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:"0.65rem", color: msColor, marginLeft:"0.4rem" }}>
                  {"● " + ms.label}
                </span>
              </div>
            )}
          </div>
          <div className="ci-nav-links">
            {["news","competitors","sentiment","swot","investment"].map((id, i) => (
              <a key={id} className="ci-nav-link" href={"#" + id}
                onClick={(e) => { e.preventDefault(); const el = document.getElementById(id); if (el) el.scrollIntoView({ behavior:"smooth", block:"start" }); }}>
                {String(i+1).padStart(2,"0")}
              </a>
            ))}
          </div>
          <div className="nav-search-wrap">
            <a href="index.html" className="nav-back-btn">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                <polyline points="15 18 9 12 15 6" />
              </svg>
              {"Home"}
            </a>
            <div className="nav-search-box">
              <input className="nav-search-input" placeholder="New company or industry..."
                value={draft} onChange={(e) => setDraft(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") submit(); }} disabled={busy} />
              <button className="nav-search-btn" onClick={submit} disabled={busy || !draft.trim()}>
                {busy ? "..." : "Run →"}
              </button>
            </div>
          </div>
        </nav>
      );
    }

    function App() {
      const [briefing, setBriefing] = useState(null);
      const [tweaks,   setTweaks]   = useState({ accent: "#e7ff52", density: "comfy", showChat: true });

      useEffect(() => {
        const raw = sessionStorage.getItem("briefing");
        if (raw) {
          try {
            const b = JSON.parse(raw);
            setBriefing(b);
            document.title = "CompIntel · " + (b.ticker && b.ticker.symbol ? b.ticker.symbol : b.hero && b.hero.name ? b.hero.name : "Report");
          } catch(e) { window.location.href = "index.html"; }
        } else { window.location.href = "index.html"; }
        document.getElementById("loading-screen").classList.add("hidden");
      }, []);

      useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty("--accent", tweaks.accent);
        const hex = tweaks.accent.replace("#","");
        const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
        const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
        root.style.setProperty("--accent-ink", lum > 0.6 ? "#0a0a0b" : "#fafafa");
      }, [tweaks.accent]);

      if (!briefing) return null;

      const handleNewReport = (company) => runNewReport(company, (b) => {
        setBriefing(b);
        document.title = "CompIntel · " + (b.ticker && b.ticker.symbol ? b.ticker.symbol : b.hero.name);
      });

      return (
        <div className={"ci-app density-" + tweaks.density}>
          <TopNavWithSearch briefing={briefing} onNewReport={handleNewReport} />
          <main className="ci-shell">
            <Hero data={briefing.hero} />
            <NewsSection items={briefing.news || []} />
            <CompetitorsSection items={briefing.competitors || []} />
            <SentimentSection data={briefing.sentiment || { score:0, trend:"Stable", drivers:[] }} />
            <SwotSection data={briefing.swot || { S:[], W:[], O:[], T:[] }} />
            <InvestmentSection data={briefing.investment || { signal:"Neutral", bull:"", bear:"", catalysts:[], risks:[], strategies:[] }} />
          </main>
          <Foot />

          <div className="bottom-search-wrap">
            <div className="bottom-search-label">Run a new report</div>
            <div className="bottom-search-box">
              <input
                id="bottom-search-input"
                className="bottom-search-input"
                placeholder="Enter a company or industry..."
                onKeyDown={(e) => {
                  if (e.key === "Enter") {
                    const val = document.getElementById("bottom-search-input").value.trim();
                    if (val) handleNewReport(val);
                  }
                }}
              />
              <button
                className="bottom-search-btn"
                onClick={() => {
                  const val = document.getElementById("bottom-search-input").value.trim();
                  if (val) handleNewReport(val);
                }}
              >
                Run →
              </button>
            </div>
          </div>

          {tweaks.showChat && <Chatbot briefing={briefing} apiBase={API_BASE} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
